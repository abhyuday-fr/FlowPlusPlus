app-id: io.github.abhyudayfr.FlowPlusPlus
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk//6.8
command: FlowPlusPlus

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
  - name: FlowPlusPlus
    buildsystem: simple
    build-commands:
      - cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=/app
      - cmake --build build
      - cmake --install build --component Runtime
      - install -Dm755 build/FlowPlusPlus /app/bin/FlowPlusPlus
    sources:
      - type: dir
        path: ..
