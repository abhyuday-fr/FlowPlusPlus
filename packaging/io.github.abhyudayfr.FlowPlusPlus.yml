app-id: io.github.abhyudayfr.FlowPlusPlus
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk//6.8
command: FlowPlusPlus

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: FlowPlusPlus
    buildsystem: simple
    build-commands:
      - cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=/app
      - cmake --build build
      - cmake --install build
      - install -Dm644 packaging/FlowPlusPlus.desktop /app/share/applications/io.github.abhyudayfr.FlowPlusPlus.desktop
      - install -Dm644 packaging/FlowPlusPlus.png /app/share/icons/hicolor/512x512/apps/io.github.abhyudayfr.FlowPlusPlus.png
    sources:
      - type: dir
        path: ..
